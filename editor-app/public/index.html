<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Stamp DB Editor</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header class="topbar">
      <h1>Stamp DB Editor</h1>
      <div class="topbar-actions">
        <button id="exportJsonBtn" type="button">Export JSON</button>
        <button id="importJsonBtn" type="button">Import JSON</button>
        <button id="refreshBtn" type="button">Refresh</button>
      </div>
    </header>

    <main class="layout">
      <section class="panel blocks-panel">
        <div class="blocks-toolbar">
          <h2>Blocks</h2>
          <div class="blocks-toolbar-actions">
            <button id="addBlockBtn" type="button">Add</button>
            <button id="filterToggleBtn" type="button">Filters</button>
            <button id="toggleCollapseAllBtn" type="button">
              Collapse All
            </button>
          </div>
        </div>
        <p class="hint">
          Drag stamps between blocks. Click a stamp or block to edit details in
          the forms.
        </p>
        <div id="filterPanel" class="filter-panel" hidden>
          <div class="filter-grid">
            <label class="filter-field"
              >Year after
              <input
                id="filterYearAfter"
                type="number"
                placeholder="e.g. 1900"
                min="1800"
                max="2100"
                autocomplete="off"
              />
            </label>
            <label class="filter-field"
              >Year before
              <input
                id="filterYearBefore"
                type="number"
                placeholder="e.g. 2000"
                min="1800"
                max="2100"
                autocomplete="off"
              />
            </label>
            <label class="filter-field"
              >Catalog number
              <input
                id="filterCatalogNumber"
                type="search"
                placeholder="Search..."
                autocomplete="off"
              />
            </label>
            <label class="filter-field"
              >NVPH number
              <input
                id="filterNvphNumber"
                type="search"
                placeholder="Search..."
                autocomplete="off"
              />
            </label>
            <label class="filter-field"
              >Block name
              <input
                id="filterBlockName"
                type="search"
                placeholder="Search..."
                autocomplete="off"
              />
            </label>
            <label class="filter-field"
              >Number of stamps
              <div class="filter-field-row">
                <select
                  id="filterStampCountOperator"
                  aria-label="Stamp count operator"
                >
                  <option value=">">&gt;</option>
                  <option value="<">&lt;</option>
                  <option value="=">=</option>
                </select>
                <input
                  id="filterStampCount"
                  type="number"
                  min="0"
                  placeholder="e.g. 4"
                  autocomplete="off"
                />
              </div>
            </label>
            <label class="filter-field"
              >Color
              <input
                id="filterColor"
                type="search"
                placeholder="Search..."
                autocomplete="off"
              />
            </label>
            <label class="filter-field"
              >Denomination
              <input
                id="filterDenomination"
                type="search"
                placeholder="Search..."
                autocomplete="off"
              />
            </label>
            <label class="filter-field"
              >Width
              <div class="filter-field-row">
                <input
                  id="filterWidth"
                  type="number"
                  step="0.1"
                  placeholder="e.g. 25"
                  autocomplete="off"
                />
                <label class="filter-inline-check"
                  ><input id="filterWidthMissing" type="checkbox" /> Missing
                  only</label
                >
              </div>
            </label>
            <label class="filter-field"
              >Height
              <div class="filter-field-row">
                <input
                  id="filterHeight"
                  type="number"
                  step="0.1"
                  placeholder="e.g. 30"
                  autocomplete="off"
                />
                <label class="filter-inline-check"
                  ><input id="filterHeightMissing" type="checkbox" /> Missing
                  only</label
                >
              </div>
            </label>
            <label class="filter-field filter-field--checkbox">
              <input id="filterMissingImages" type="checkbox" /> Missing images
              only
            </label>
          </div>
          <div class="filter-actions">
            <button id="clearFiltersBtn" type="button">Clear filters</button>
          </div>
        </div>
        <div id="blocksContainer" class="blocks-grid"></div>
      </section>
    </main>

    <dialog id="importDialog" class="form-dialog">
      <div class="dialog-head">
        <h2>Import JSON</h2>
        <button
          id="closeImportDialogBtn"
          type="button"
          class="icon-btn"
          aria-label="Close import form"
          title="Close"
        >
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path
              d="M18.3 5.7L12 12l6.3 6.3-1.4 1.4L10.6 13.4 4.3 19.7 2.9 18.3 9.2 12 2.9 5.7 4.3 4.3l6.3 6.3 6.3-6.3z"
            />
          </svg>
        </button>
      </div>
      <div
        id="importFormError"
        class="error-banner"
        style="display: none"
      ></div>
      <form id="importForm">
        <label>
          JSON file
          <input id="importJsonFile" type="file" accept="application/json" />
        </label>
        <label>
          Or paste JSON
          <textarea id="importJsonText" rows="10"></textarea>
        </label>
        <fieldset>
          <legend>Import mode</legend>
          <label>
            <input type="radio" name="import_mode" value="add" checked />
            Add to current collection
          </label>
          <label>
            <input type="radio" name="import_mode" value="replace" />
            Replace current collection
          </label>
        </fieldset>
        <p class="import-warning" id="importReplaceWarning" hidden>
          Warning: replacing will remove all existing blocks and stamps.
        </p>
        <div class="actions">
          <button type="submit">Import JSON</button>
          <button type="button" id="cancelImportBtn">Cancel</button>
        </div>
      </form>
    </dialog>

    <dialog id="blockDialog" class="form-dialog">
      <div class="dialog-head">
        <h2 id="blockDialogTitle">Block Form</h2>
        <button
          id="closeBlockDialogBtn"
          type="button"
          class="icon-btn"
          aria-label="Close block form"
          title="Close"
        >
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path
              d="M18.3 5.7L12 12l6.3 6.3-1.4 1.4L10.6 13.4 4.3 19.7 2.9 18.3 9.2 12 2.9 5.7 4.3 4.3l6.3 6.3 6.3-6.3z"
            />
          </svg>
        </button>
      </div>
      <div id="blockFormError" class="error-banner" style="display: none"></div>
      <form id="blockForm">
        <input type="hidden" name="block_id" />
        <label>Year <input name="year" /></label>
        <label>Title <input name="title" /></label>
        <!-- Removed: Nr of stamps, Starting stamp, Next block starting stamp -->
        <div class="actions">
          <button type="submit">Save Block</button>
          <button type="button" id="cancelBlockBtn">Cancel</button>
        </div>
      </form>
    </dialog>

    <dialog id="stampDialog" class="form-dialog">
      <div class="dialog-head">
        <h2 id="stampDialogTitle">Stamp Form</h2>
        <button
          id="closeStampDialogBtn"
          type="button"
          class="icon-btn"
          aria-label="Close stamp form"
          title="Close"
        >
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path
              d="M18.3 5.7L12 12l6.3 6.3-1.4 1.4L10.6 13.4 4.3 19.7 2.9 18.3 9.2 12 2.9 5.7 4.3 4.3l6.3 6.3 6.3-6.3z"
            />
          </svg>
        </button>
      </div>
      <form id="stampForm">
        <div
          id="stampFormError"
          class="error-banner"
          style="display: none"
        ></div>
        <input type="hidden" name="stamp_id" />
        <label
          >Block
          <select name="block_id" required id="stampBlockSelect"></select>
        </label>
        <label>Catalog number <input name="catalog_number" required /></label>
        <label>NVPH number <input name="nvph_number" /></label>
        <label>Denomination <input name="denomination" /></label>
        <label>Color <input name="color" /></label>
        <label>Height <input name="height" type="number" step="0.1" /></label>
        <label>Width <input name="width" type="number" step="0.1" /></label>
        <label
          >Image path
          <input name="image_path" placeholder="images/stamps/example.jpg"
        /></label>
        <label>Type <input name="stamp_type" /></label>
        <div class="actions">
          <button type="submit">Save Stamp</button>
          <button type="button" id="cancelStampBtn">Cancel</button>
        </div>
      </form>
    </dialog>

    <template id="stampCardTemplate">
      <article class="stamp-card" draggable="true">
        <img alt="stamp" />
        <div class="stamp-card-body">
          <strong class="catalog"></strong>
          <span class="meta"></span>
        </div>
        <button
          class="danger remove-stamp icon-btn"
          type="button"
          title="Remove stamp"
          aria-label="Remove stamp"
        >
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path
              d="M9 3h6l1 2h4v2H4V5h4l1-2zm1 6h2v9h-2V9zm4 0h2v9h-2V9zM7 9h2v9H7V9z"
            />
          </svg>
        </button>
      </article>
    </template>

    <script type="module" src="./js/main.js"></script>
  </body>
</html>
